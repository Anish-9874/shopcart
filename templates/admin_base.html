{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}ShopCart Admin{% endblock %}</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#F8FAFC;
    color:#1E293B;
}

/* Layout */

.layout{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:250px;
    background:#0F172A;
    padding-top:20px;
    position:fixed;
    left:0;
    top:0;
    bottom:0;
}

.sidebar a{
    display:block;
    padding:14px 24px;
    color:#CBD5E1;
    text-decoration:none;
    transition:.3s;
    font-size:15px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#2563EB;
    color:#fff;
}

/* Main Content */

.content{
    margin-left:250px;
    width:100%;
    padding:30px;
}

/* Page Header */

.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.page-header h1{
    font-size:28px;
    color:#0F172A;
}

/* Tables */

.table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.table th{
    background:#F1F5F9;
    color:#64748B;
    text-transform:uppercase;
    padding:15px;
}

.table td{
    padding:15px;
    border-bottom:1px solid #E2E8F0;
}

.table tr:hover{
    background:#F8FAFC;
}

/* Buttons */

.btn-primary{
    background:#2563EB;
    color:#fff;
    text-decoration:none;
    padding:10px 18px;
    border-radius:6px;
}

.btn-primary:hover{
    background:#1D4ED8;
}

.btn-success{
    background:#10B981;
    color:#fff;
    text-decoration:none;
    padding:10px 18px;
    border-radius:6px;
}

.btn-success:hover{
    background:#059669;
}

.btn-danger{
    background:#EF4444;
    color:#fff;
    text-decoration:none;
    padding:10px 18px;
    border-radius:6px;
}

.btn-danger:hover{
    background:#DC2626;
}

</style>

{% block extra_css %}
{% endblock %}

</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <div class="sidebar">

        <a href="{% url 'admin_dashboard' %}">📊 Dashboard</a>

        <a href="{% url 'add_product' %}">📦 Add Products</a>

        <a href="{% url 'see_product' %}">🛒 Products</a>

        <a href="{% url 'customer_list' %}">👥 Customers</a>

        <a href="{% url 'inbox' %}">💬 Chats</a>

        <a href="#">⭐ Reviews</a>

        <a href="#">📈 Reports</a>

        <a href="{% url 'logout' %}">🚪 Logout</a>

    </div>

    <!-- Page Content -->

    <div class="content">

        {% block content %}
        {% endblock %}

    </div>

</div>

{% block extra_js %}
{% endblock %}

</body>
</html>
