<nav>
  <a class="nav-brand" href="{% url 'home' %}">
    Shop<span>Cart</span>
  </a>

  <ul class="nav-links">
    <li>
      <a href="{% url 'home' %}"
         class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
         Home
      </a>
    </li>

    <li>
      <a href="{% url 'product_list' %}"
         class="{% if 'product' in request.resolver_match.url_name %}active{% endif %}">
         Products
      </a>
    </li>

    <li>
      <a href="{% url 'category_list' %}">Categories</a>
    </li>

    <li>
      <a href="#">Loading</a>
    </li>

    <li>
      <a href="{% url 'about' %}">About</a>
    </li>

    <li>
      <a href="{% url 'contact' %}">Contact</a>
    </li>
  </ul>

  <div class="nav-actions">
    {% if user.is_authenticated %}
      <a href="{% url 'profile' %}" class="btn btn-outline">
        👤 {{ user.username }}
      </a>
      <a href="{% url 'logout' %}" class="btn btn-outline">
        Logout
      </a>
      <a href="{% url 'cart' %}" class="cart-btn">
      🛒 Cart
      {% if cart_count %}
        <span class="cart-badge">{{ cart_count }}</span>
      {% endif %}
    </a>
    {% else %}
      <a href="{% url 'login' %}" class="btn btn-outline">
        Login
      </a>
      <a href="{% url 'signup' %}" class="btn btn-primary">
        Sign Up
      </a>
    {% endif %}

    
  </div>
</nav>
