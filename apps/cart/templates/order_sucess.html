{% extends 'base.html' %}

{% block content %}

<style>

.success-box{

    max-width:600px;

    margin:80px auto;

    background:white;

    padding:40px;

    text-align:center;

    border-radius:10px;

    box-shadow:0 5px 15px rgba(0,0,0,.1);

}

.success-box h1{

    color:green;

    margin-bottom:20px;

}

.success-box a{

    display:inline-block;

    margin-top:20px;

    padding:12px 25px;

    background:#0d6efd;

    color:white;

    text-decoration:none;

    border-radius:5px;

}

</style>

<div class="success-box">

    <h1>✅ Order Placed Successfully</h1>

    <p>Your order has been placed successfully.</p>

    <a href="{% url 'my_orders' %}">
        View My Orders
    </a>

</div>

{% endblock %}
