{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/profile.css' %}">

<div class="profile-container">

    <div class="profile-card">

        <h2>Edit Profile</h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {% if profile.profile_image %}
                <img src="{{ profile.profile_image.url }}" class="profile-image">
            {% else %}
                <img src="{% static 'images/default-profile.png' %}" class="profile-image">
            {% endif %}

            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    value="{{ request.user.username }}"
                    readonly>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ request.user.email }}">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input
                    type="text"
                    name="phone"
                    value="{{ profile.phone }}">
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea
                    name="address"
                    rows="4">{{ profile.address }}</textarea>
            </div>

            <div class="form-group">
                <label>Profile Image</label>
                <input
                    type="file"
                    name="profile_image">
            </div>

            <button type="submit" class="save-btn">
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
