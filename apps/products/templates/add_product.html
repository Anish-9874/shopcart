{% extends 'admin_base.html' %}

{% block title %}Add Product{% endblock %}

{% block extra_css %}

<style>

.form-container{
    max-width:700px;
    margin:20px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.form-container h2{
    margin-bottom:25px;
    color:#0F172A;
    text-align:center;
}

form p{
    margin-bottom:18px;
}

form label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

form input,
form textarea,
form select{
    width:100%;
    padding:12px;
    border:1px solid #CBD5E1;
    border-radius:8px;
    font-size:15px;
    outline:none;
}

form input:focus,
form textarea:focus,
form select:focus{
    border-color:#2563EB;
}

.submit-btn{
    width:100%;
    background:#2563EB;
    color:#fff;
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#1D4ED8;
}

</style>

{% endblock %}

{% block content %}

<div class="page-header">
    <h1>📦 Add Product</h1>
</div>

<div class="form-container">

    <h2>Add New Product</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="submit-btn">
            Add Product
        </button>

    </form>

</div>

{% endblock %}
