{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#8E2DE2,#4A00E0);

}

.container{

    width:420px;
    padding:40px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(18px);

    border-radius:20px;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.container h1{

    color:white;
    text-align:center;
    margin-bottom:25px;

}

.container input{

    width:100%;

    padding:14px;
    margin:12px 0;

    border:none;

    border-radius:10px;

    outline:none;

    font-size:15px;

}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:white;

    color:#4A00E0;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#4A00E0;
    color:white;

}

p{

    text-align:center;
    margin-top:20px;
    color:white;

}

a{

    color:white;
    font-weight:bold;
    text-decoration:none;

}

ul.errorlist{

    color:#ffdcdc;
    list-style:none;
    margin-bottom:10px;

}

.helptext{

    color:#eee;
    font-size:12px;

}

</style>

</head>
<body>

<div class="container">

<h1>Create Account</h1>

<form method="POST">
    {% csrf_token %}

    {% if form.non_field_errors %}
        {{ form.non_field_errors }}
    {% endif %}

    Username<br>
    <input
        type="text" name="username" placeholder="Enter Username" value="{{ form.username.value|default:'' }}">

    {{ form.username.errors }}

    <br><br>

    Password<br>
    <input
        type="password" name="password1" placeholder="Enter Password">

    {{ form.password1.errors }}

    <br><br>

    Confirm Password<br>
    <input
        type="password" name="password2" placeholder="Re-enter Password">

    {{ form.password2.errors }}

    <br><br>

    <button type="submit">Create Account</button>

</form>

<p>

Already have an account?

<a href="{% url 'login' %}">Login</a>

</p>

</div>

</body>
</html>
