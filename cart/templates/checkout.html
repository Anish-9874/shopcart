{% extends "base.html" %}

{% block content %}

<style>
.checkout{
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

.box{
    border:1px solid #ddd;
    border-radius:6px;
    padding:20px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.total{
    text-align:right;
    font-size:20px;
    font-weight:bold;
    margin:20px 0;
}

button{
    width:100%;
    padding:12px;
    background:#f85606;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#d84a00;
}
</style>

<div class="checkout">

    <h2>Checkout</h2>

    <div class="box">

        {% for item in items %}

        <div class="item">
            <div>
                <strong>{{ item.product.name }}</strong><br>
                Rs. {{ item.product.price }} × {{ item.quantity }}
            </div>

            <div>
                Rs. {{ item.subtotal }}
            </div>
        </div>

        {% endfor %}

        <div class="total">
            Total: Rs. {{ total }}
        </div>

        <form method="POST">
            {% csrf_token %}
            <button type="submit">
                Place Order
            </button>
        </form>

    </div>

</div>

{% endblock %}
