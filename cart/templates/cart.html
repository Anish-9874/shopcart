<h1>Your Cart</h1>

{% for item in items %}

<div class="cart-item">

    <img src="{{ item.product.image.url }}" width="120">

    <h3>{{ item.product.name }}</h3>

    <p>Rs. {{ item.product.price }}</p>

    <a href="{% url 'decrease_quantity' item.id %}">-</a>

    {{ item.quantity }}

    <a href="{% url 'increase_quantity' item.id %}">+</a>

    <p>Subtotal: Rs. {{ item.subtotal }}</p>

    <a href="{% url 'remove_item' item.id %}">
        Remove
    </a>

</div>

<hr>

{% empty %}

<h2>Your cart is empty.</h2>

{% endfor %}

<h2>Total : Rs. {{ total }}</h2>

<a href="{% url 'checkout' %}">
    <button>Checkout</button>
</a>
